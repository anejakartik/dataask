services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DATAASK_MODEL=${DATAASK_MODEL:-gpt-4o-mini}
      - DATAASK_CORS_ORIGINS=${DATAASK_CORS_ORIGINS:-*}
    restart: unless-stopped
